name = "tc39-mcp"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Static assets for the docs site. The Worker dispatches /mcp +
# /health to JSON-RPC; everything else is served from this directory.
# Populated by the deploy workflow:
#   npm run docs:build && cp -r docs/.vitepress/dist worker/public
# Gitignored; rebuilt fresh on every deploy.
[assets]
directory = "./public"
binding = "ASSETS"
# `auto-trailing-slash` matches VitePress's `cleanUrls: true` output:
# `/tools/index.html` is reachable at both `/tools/` and `/tools`.
html_handling = "auto-trailing-slash"
# Unknown paths render the VitePress-generated 404.html (themed +
# navigation intact) instead of Cloudflare's generic 404.
not_found_handling = "404-page"

# R2 bucket holding the parsed spec snapshots + indexes. The bucket
# is read at runtime via env.SPECS — see `loadFromR2()` in src/r2.ts.
# Provision once with:
#   wrangler r2 bucket create tc39-mcp-specs
[[r2_buckets]]
binding = "SPECS"
bucket_name = "tc39-mcp-specs"
preview_bucket_name = "tc39-mcp-specs-preview"

# Per-Worker storage for the in-memory parse cache. Workers recycle
# isolates eventually, so this is best-effort; the actual cache lives
# inside src/r2.ts module scope.
[vars]
LOG_LEVEL = "info"

# Built-in per-Worker rate limiter (Cloudflare's `ratelimit` binding).
# 100 requests per 60 s per client IP — enough headroom for any
# reasonable agent workflow, low enough to cut off scrapers + bad
# actors who'd otherwise rack up R2 egress. Tune via the dashboard
# without re-deploying by overriding [[unsafe.bindings]] in wrangler
# environments.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# Routes / observability are configured per-deployment; keep the
# committed config minimal so anyone can `wrangler deploy --env=...`
# against their own account without colliding with ours.
[observability]
enabled = true
