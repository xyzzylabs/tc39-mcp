name = "tc39-mcp"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Static assets for the docs site. The Worker dispatches /mcp +
# /health to JSON-RPC; everything else is served from this directory.
# Populated by the deploy workflow:
#   npm run docs:build && cp -r docs/.vitepress/dist worker/public
# Gitignored; rebuilt fresh on every deploy.
[assets]
directory = "./public"
binding = "ASSETS"
# `auto-trailing-slash` matches VitePress's `cleanUrls: true` output:
# `/tools/index.html` is reachable at both `/tools/` and `/tools`.
html_handling = "auto-trailing-slash"
# Unknown paths render the VitePress-generated 404.html (themed +
# navigation intact) instead of Cloudflare's generic 404.
not_found_handling = "404-page"

# R2 bucket holding the parsed spec snapshots + indexes. The bucket
# is read at runtime via env.SPECS — see `loadFromR2()` in src/r2.ts.
# Provision once with:
#   wrangler r2 bucket create tc39-mcp-specs
[[r2_buckets]]
binding = "SPECS"
bucket_name = "tc39-mcp-specs"
preview_bucket_name = "tc39-mcp-specs-preview"

# Per-Worker storage for the in-memory parse cache. Workers recycle
# isolates eventually, so this is best-effort; the actual cache lives
# inside src/r2.ts module scope.
[vars]
LOG_LEVEL = "info"

# Built-in per-Worker rate limiter (Cloudflare's `ratelimit` binding).
# Anonymous traffic: 30 requests per 60 s per client IP — comfortable
# for any human + agent workflow (an interactive chat session rarely
# exceeds ~5/min), tight enough that a single scraper running flat-out
# for a month can't cross the R2 Class B free allowance. Math: 30/min
# × 1440 min × 30 days × 3 R2 reads/req ≈ 3.9 M Class B reads/month
# per IP, well under the 10 M free allowance. Tune via the dashboard
# without re-deploying by overriding [[unsafe.bindings]] in wrangler
# environments.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# Higher-cap rate limiter used when a valid sponsor key is presented
# (see worker/src/auth.ts). 300 requests per 60 s per key — 10× the
# anonymous tier, bucketed per-key instead of per-IP so the same key
# can be used from multiple machines without those machines fighting
# each other. The SPONSORS KV namespace (below) decides which keys
# qualify.
[[unsafe.bindings]]
name = "SPONSOR_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 300, period = 60 }

# KV namespace storing sponsor metadata. Each entry's key is the
# sha256 (lowercase hex) of an issued API key; the value is a JSON
# blob produced by worker/scripts/issue-sponsor-key.ts. Provision the
# namespace once with:
#
#   wrangler kv namespace create sponsors
#
# then paste the returned id into the `id` field below.
[[kv_namespaces]]
binding = "SPONSORS"
id = "REPLACE_ME_AFTER_wrangler_kv_namespace_create"
preview_id = "REPLACE_ME_AFTER_wrangler_kv_namespace_create_preview"


# Routes / observability are configured per-deployment; keep the
# committed config minimal so anyone can `wrangler deploy --env=...`
# against their own account without colliding with ours.
[observability]
enabled = true
